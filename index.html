<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>좌석 배치도 & 이름표 관리</title>
<style>
  :root{
    --cream:#FBF7F1;
    --paper:#FFFFFF;
    --stage:#F6D9AE;
    --stage-border:#E7B978;
    --table-fill:#FDEDE7;
    --table-border:#F0BDAC;
    --table-fill-done:#DCEEE0;
    --table-border-done:#8FC79C;
    --ink:#4A3B32;
    --ink-soft:#8A7A6E;
    --accent:#C9784A;
    --accent-dark:#A85D34;
    --line:#EAE0D5;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",-apple-system,BlinkMacSystemFont,sans-serif;
    background:var(--cream);
    color:var(--ink);
    padding:28px 20px 90px;
  }
  .wrap{max-width:1560px;margin:0 auto;}

  header{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    flex-wrap:wrap;
    gap:16px;
    margin-bottom:22px;
  }
  h1{
    font-size:22px;
    margin:0 0 4px;
    letter-spacing:-0.02em;
    color:var(--ink);
  }
  .sub{
    font-size:13px;
    color:var(--ink-soft);
    margin:0;
  }
  .controls{
    display:flex;
    gap:8px;
    align-items:center;
    flex-wrap:wrap;
  }
  .search{
    padding:9px 14px;
    border:1px solid var(--line);
    border-radius:8px;
    font-size:13px;
    width:160px;
    background:var(--paper);
    color:var(--ink);
  }
  .search:focus{outline:none;border-color:var(--accent);}
  button{
    font-family:inherit;
    cursor:pointer;
    border:none;
    border-radius:8px;
    padding:9px 16px;
    font-size:13px;
    font-weight:600;
    transition:transform .12s ease, box-shadow .12s ease;
  }
  button:active{transform:scale(0.97);}
  .btn-primary{background:var(--accent);color:#fff;}
  .btn-primary:hover{background:var(--accent-dark);}
  .btn-ghost{background:var(--paper);color:var(--ink);border:1px solid var(--line);}
  .btn-ghost:hover{border-color:var(--accent);color:var(--accent-dark);}

  .summary{
    display:flex;
    gap:10px;
    margin-bottom:18px;
    flex-wrap:wrap;
  }
  .stat{
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:10px;
    padding:10px 16px;
    font-size:13px;
    min-width:110px;
  }
  .stat b{display:block;font-size:19px;color:var(--accent-dark);margin-top:2px;}

  .board{
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:16px;
    padding:28px 34px;
    position:relative;
    overflow-x:auto;
  }
  .entrance-label{
    font-size:12px;
    color:var(--ink-soft);
    margin-bottom:14px;
    padding-left:2px;
  }
  .main-area{
    display:flex;
    gap:24px;
    min-width:1500px;
  }

  .lines{flex:1;display:flex;flex-direction:column;gap:20px;}
  .line-row{display:flex;align-items:flex-start;gap:14px;}
  .line-label{
    width:42px;
    flex-shrink:0;
    font-size:12px;
    color:var(--ink-soft);
    padding-top:6px;
  }
  .line-tables{display:flex;gap:14px;flex-wrap:nowrap;}

  .landmark-square{
    width:90px;
    height:90px;
    flex-shrink:0;
    background:var(--stage);
    border:1.5px dashed var(--stage-border);
    border-radius:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    font-size:12px;
    font-weight:700;
    color:var(--accent-dark);
    line-height:1.3;
  }

  .table-box{
    background:var(--table-fill);
    border:1.5px solid var(--table-border);
    border-radius:12px;
    padding:10px;
    width:360px;
    flex-shrink:0;
    transition:border-color .12s ease, box-shadow .12s ease;
    position:relative;
  }
  .table-box.done{
    background:var(--table-fill-done);
    border-color:var(--table-border-done);
  }
  .table-box.highlight{
    animation:pulse 1s ease 2;
    border-color:var(--accent-dark);
    box-shadow:0 0 0 3px rgba(201,120,74,0.25);
  }
  @keyframes pulse{
    0%,100%{box-shadow:0 0 0 3px rgba(201,120,74,0.0);}
    50%{box-shadow:0 0 0 6px rgba(201,120,74,0.25);}
  }
  .table-head{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    margin-bottom:5px;
    padding:0 2px;
  }
  .table-box .tname{font-size:16px;font-weight:700;color:var(--ink);}
  .table-box .tcount{font-size:12px;color:var(--ink-soft);}
  .table-box.done .tcount{color:#4E8C5C;font-weight:600;}
  .seat-grid{
    display:grid;
    grid-template-columns:repeat(6, 1fr);
    gap:6px;
  }
  .seat-side-label{
    font-size:8px;
    color:var(--ink-soft);
    text-align:center;
    margin-bottom:1px;
  }
  .seat-cell{
    width:100%;
    box-sizing:border-box;
    font-size:13px;
    font-family:inherit;
    padding:6px 3px;
    border:1px solid var(--line);
    border-radius:6px;
    background:var(--paper);
    color:var(--ink);
    text-align:center;
    min-height:34px;
    display:flex;
    align-items:center;
    justify-content:center;
    line-height:1.25;
    cursor:pointer;
    user-select:none;
    overflow:visible;
    white-space:normal;
    word-break:break-word;
    transition:box-shadow .1s ease, border-color .1s ease, opacity .1s ease;
  }
  .seat-cell.empty{color:#CBBEB3;font-size:13px;}
  .seat-cell.filled{
    border-color:#E3CFC2;
    background:#fff;
    font-weight:600;
    cursor:grab;
  }
  .seat-cell.filled:active{cursor:grabbing;}
  .seat-cell.dragging{opacity:0.35;}
  .seat-cell.drop-target{
    border-color:var(--accent);
    box-shadow:0 0 0 2px rgba(201,120,74,0.25);
    background:#FFF6EF;
  }
  .seat-cell input{
    width:100%;
    border:none;
    outline:none;
    background:transparent;
    font:inherit;
    text-align:center;
    padding:0;
    color:inherit;
  }

  .side-labels{
    width:140px;
    flex-shrink:0;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    padding:4px 0;
  }
  .side-label-item{font-size:11.5px;line-height:1.5;}
  .side-label-item .kr{font-weight:700;color:var(--ink);}
  .side-label-item .en{color:var(--ink-soft);font-size:11px;}

  .kitchen-row{
    margin-top:18px;
    display:flex;
    gap:24px;
    align-items:center;
    min-width:900px;
  }
  .kitchen{
    flex:1;
    background:#F1EDE6;
    border:1.5px solid var(--line);
    border-radius:10px;
    text-align:center;
    padding:16px;
    font-size:15px;
    font-weight:700;
    color:#6B5D50;
  }
  .bottom-labels{
    width:140px;
    flex-shrink:0;
    font-size:11.5px;
    line-height:1.6;
  }
  .bottom-labels .kr{font-weight:700;}
  .bottom-labels .en{color:var(--ink-soft);font-size:11px;margin-bottom:6px;display:block;}

  /* print list */
  #printSheet{display:none;}
  @media print{
    body *{visibility:hidden;}
    #printSheet, #printSheet *{visibility:visible;}
    #printSheet{
      display:block;
      position:absolute;top:0;left:0;width:100%;
      padding:20px;
    }
    .print-table{
      break-inside:avoid;
      border:1px solid #ccc;
      border-radius:8px;
      padding:10px 14px;
      margin-bottom:10px;
    }
    .print-table h4{margin:0 0 6px;font-size:14px;}
    .print-cols{display:flex;gap:20px;font-size:12.5px;}
    .print-cols div{flex:1;}
    .print-grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:10px;
    }
  }

  .hscroll-bar{
    position:fixed;
    bottom:18px;
    left:50%;
    transform:translateX(-50%);
    z-index:500;
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:999px;
    padding:8px 16px;
    display:flex;
    align-items:center;
    gap:10px;
    box-shadow:0 10px 26px rgba(60,45,35,0.16);
  }
  .hscroll-btn{
    width:32px;
    height:32px;
    border-radius:50%;
    background:var(--accent);
    color:#fff;
    font-size:15px;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:0;
    flex-shrink:0;
  }
  .hscroll-btn:hover{background:var(--accent-dark);}
  .hscroll-slider{
    -webkit-appearance:none;
    appearance:none;
    width:220px;
    height:5px;
    border-radius:999px;
    background:var(--line);
    outline:none;
    cursor:pointer;
  }
  .hscroll-slider::-webkit-slider-thumb{
    -webkit-appearance:none;
    appearance:none;
    width:16px;
    height:16px;
    border-radius:50%;
    background:var(--accent);
    border:2px solid #fff;
    box-shadow:0 1px 4px rgba(0,0,0,0.25);
    cursor:pointer;
  }
  .hscroll-slider::-moz-range-thumb{
    width:16px;
    height:16px;
    border-radius:50%;
    background:var(--accent);
    border:2px solid #fff;
    box-shadow:0 1px 4px rgba(0,0,0,0.25);
    cursor:pointer;
  }

  @media (max-width:760px){
    .side-labels{display:none;}
    .table-box{width:300px;}
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div>
      <h1>좌석 배치도 &amp; 이름표 관리</h1>

    </div>
    <div class="controls">
      <input type="text" class="search" id="searchInput" placeholder="이름으로 검색...">

        <span class="en">(boom gate)</span>
      </div>
    </div>
  </div>
</div>

<!-- Print sheet -->
<div id="printSheet">
  <h2 style="margin-bottom:14px;">좌석 배치 명단</h2>
  <div class="print-grid" id="printGrid"></div>
</div>

<!-- Fixed horizontal scroll control -->
<div class="hscroll-bar" id="hscrollBar">
  <button class="hscroll-btn" id="hscrollLeftBtn" aria-label="왼쪽으로 이동">◀</button>
  <input type="range" class="hscroll-slider" id="hscrollSlider" min="0" max="100" value="0">
  <button class="hscroll-btn" id="hscrollRightBtn" aria-label="오른쪽으로 이동">▶</button>
</div>

<script>

function buildBoard(){
  const container = document.getElementById("linesContainer");
  container.innerHTML = "";
  LINES.forEach((line, lineIdx)=>{
    const row = document.createElement("div");
    row.className = "line-row";
    const label = document.createElement("div");
    label.className = "line-label";
    label.textContent = line.label;
    row.appendChild(label);
    const tablesWrap = document.createElement("div");
    tablesWrap.className = "line-tables";
    line.ids.forEach(id=>{
      const key = "T"+id;
      const box = document.createElement("div");
      box.className = "table-box";
      box.id = "box-"+key;

      const head = document.createElement("div");
      head.className = "table-head";
      head.innerHTML = `<span class="tname">${key}</span><span class="tcount">0/12</span>`;
      box.appendChild(head);

      const grid = document.createElement("div");
      grid.className = "seat-grid";
      for(let i=0;i<12;i++){
        const cell = createSeatCell(key, i);
        grid.appendChild(cell);
      }
      box.appendChild(grid);
      tablesWrap.appendChild(box);
    });
    row.appendChild(tablesWrap);
    container.appendChild(row);

    // Insert landmark square between Line 3 and Line 4,
    // aligned to the same column as T1 / T5 (first table of each line)
    if(lineIdx === 2){
      const landmarkRow = document.createElement("div");
      landmarkRow.className = "line-row landmark-row";
      const spacer = document.createElement("div");
      spacer.className = "line-label";
      landmarkRow.appendChild(spacer);
      const landmarkWrap = document.createElement("div");
      landmarkWrap.className = "line-tables";
      const square = document.createElement("div");
      square.className = "landmark-square";
      square.textContent = "무대";
      landmarkWrap.appendChild(square);
      landmarkRow.appendChild(landmarkWrap);
      container.appendChild(landmarkRow);
    }
  });
}

let dragSource = null; // { table, idx }

function createSeatCell(key, idx){
  const cell = document.createElement("div");
  cell.className = "seat-cell empty";
  cell.dataset.table = key;
  cell.dataset.idx = idx;
  cell.textContent = idx+1;
  cell.draggable = false;
  cell.addEventListener("click", ()=> startEditCell(cell));
  cell.addEventListener("dragstart", handleDragStart);
  cell.addEventListener("dragend", handleDragEnd);
  cell.addEventListener("dragover", handleDragOver);
  cell.addEventListener("dragleave", handleDragLeave);
  cell.addEventListener("drop", handleDrop);
  return cell;
}

function startEditCell(cell){
  if(cell.querySelector("input")) return;
  const key = cell.dataset.table;
  const idx = parseInt(cell.dataset.idx);
  const currentVal = (data[key] && data[key][idx]) || "";
  cell.textContent = "";
  cell.draggable = false;
  const inp = document.createElement("input");
  inp.type = "text";
  inp.value = currentVal;
  inp.addEventListener("blur", ()=> commitEditCell(cell, inp.value));
  inp.addEventListener("keydown", (e)=>{
    if(e.key === "Enter"){ inp.blur(); }
    if(e.key === "Escape"){ inp.value = currentVal; inp.blur(); }
  });
  cell.appendChild(inp);
  inp.focus();
  inp.select();
}

function commitEditCell(cell, value){
  const key = cell.dataset.table;
  const idx = parseInt(cell.dataset.idx);
  if(!data[key]) data[key] = emptySeats();
  data[key][idx] = value.trim();
  renderSeatCell(cell);
  refreshBoxUI(key);
  refreshAllUI();
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveData, 400);
}

function renderSeatCell(cell){
  const key = cell.dataset.table;
  const idx = parseInt(cell.dataset.idx);
  const val = (data[key] && data[key][idx]) || "";
  cell.innerHTML = "";
  if(val){
    cell.textContent = val;
    cell.classList.remove("empty");
    cell.classList.add("filled");
    cell.draggable = true;
    cell.title = val;
  } else {
    cell.textContent = idx+1;
    cell.classList.remove("filled");
    cell.classList.add("empty");
    cell.draggable = false;
    cell.removeAttribute("title");
  }
}

function handleDragStart(e){
  const cell = e.currentTarget;
  dragSource = { table: cell.dataset.table, idx: parseInt(cell.dataset.idx) };
  cell.classList.add("dragging");
  e.dataTransfer.effectAllowed = "move";
  e.dataTransfer.setData("text/plain", cell.dataset.table+":"+cell.dataset.idx);
}

function handleDragEnd(e){
  e.currentTarget.classList.remove("dragging");
  document.querySelectorAll(".seat-cell.drop-target").forEach(c=>c.classList.remove("drop-target"));
  dragSource = null;
}

function handleDragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect = "move";
  e.currentTarget.classList.add("drop-target");
}

function handleDragLeave(e){
  e.currentTarget.classList.remove("drop-target");
}

function handleDrop(e){
  e.preventDefault();
  const targetCell = e.currentTarget;
  targetCell.classList.remove("drop-target");
  if(!dragSource) return;
  const targetKey = targetCell.dataset.table;
  const targetIdx = parseInt(targetCell.dataset.idx);
  const srcKey = dragSource.table;
  const srcIdx = dragSource.idx;
  if(srcKey === targetKey && srcIdx === targetIdx) return;
  if(!data[srcKey]) data[srcKey] = emptySeats();
  if(!data[targetKey]) data[targetKey] = emptySeats();
  const tmp = data[targetKey][targetIdx];
  data[targetKey][targetIdx] = data[srcKey][srcIdx];
  data[srcKey][srcIdx] = tmp;
  renderTableValues(srcKey);
  renderTableValues(targetKey);
  refreshBoxUI(srcKey);
  refreshBoxUI(targetKey);
  refreshAllUI();
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveData, 400);
}

function renderTableValues(key){
  const cells = document.querySelectorAll(`.seat-cell[data-table="${key}"]`);
  cells.forEach(cell=> renderSeatCell(cell));
}

function renderAllTableValues(){
  for(let i=1;i<=TOTAL_TABLES;i++){
    renderTableValues("T"+i);
  }
}

function refreshBoxUI(key){
  const seats = data[key] || emptySeats();
  const filled = seats.filter(s=>s && s.trim()!=="").length;
  const box = document.getElementById("box-"+key);
  if(!box) return;
  box.classList.toggle("done", filled === 12);
  box.querySelector(".tcount").textContent = filled+"/12";
}

function refreshAllUI(){
  let totalFilled = 0;
  let doneCount = 0;
  for(let i=1;i<=TOTAL_TABLES;i++){
    const key = "T"+i;
    refreshBoxUI(key);
    const seats = data[key] || emptySeats();
    const filled = seats.filter(s=>s && s.trim()!=="").length;
    totalFilled += filled;
    if(filled===12) doneCount++;
  }
  document.getElementById("statPeople").textContent = totalFilled + " / " + (TOTAL_TABLES*12);
  document.getElementById("statDone").textContent = doneCount + " / " + TOTAL_TABLES;
}

async function loadData(){
  try{
    const result = await window.storage.get(STORAGE_KEY, false);
    if(result && result.value){
      data = JSON.parse(result.value);
    } else {
      data = JSON.parse(JSON.stringify(seedData));
      await saveData();
    }
  }catch(e){
    data = JSON.parse(JSON.stringify(seedData));
    await saveData();
  }
  renderAllTableValues();
  refreshAllUI();
}

async function handleReimport(){
  if(!confirm("현재 저장된 내용을 CSV로 가져온 원본 데이터로 덮어씁니다. 계속할까요?")) return;
  data = JSON.parse(JSON.stringify(seedData));
  renderAllTableValues();
  refreshAllUI();
  await saveData();
}

async function saveData(){
  try{
    await window.storage.set(STORAGE_KEY, JSON.stringify(data), false);
    return true;
  }catch(e){
    console.error("save failed", e);
    return false;
  }
}

function handleSearch(){
  const q = document.getElementById("searchInput").value.trim();
  document.querySelectorAll(".table-box").forEach(b=>b.classList.remove("highlight"));
  if(!q) return;
  for(let i=1;i<=TOTAL_TABLES;i++){
    const key = "T"+i;
    const seats = data[key] || [];
    if(seats.some(s=> s && s.toLowerCase().includes(q.toLowerCase()))){
      const box = document.getElementById("box-"+key);
      if(box){
        box.classList.add("highlight");
        box.scrollIntoView({behavior:"smooth", block:"center", inline:"center"});
      }
      break;
    }
  }
}

function buildPrintSheet(){
  const grid = document.getElementById("printGrid");
  grid.innerHTML = "";
  for(let i=1;i<=TOTAL_TABLES;i++){
    const key = "T"+i;
    const seats = data[key] || emptySeats();
    const left = seats.slice(0,6).filter(s=>s).join(", ") || "-";
    const right = seats.slice(6,12).filter(s=>s).join(", ") || "-";
    const div = document.createElement("div");
    div.className = "print-table";
    div.innerHTML = `<h4>${key}</h4>
      <div class="print-cols">
        <div><b>왼쪽</b><br>${left}</div>
        <div><b>오른쪽</b><br>${right}</div>
      </div>`;
    grid.appendChild(div);
  }
}

document.getElementById("searchInput").addEventListener("input", handleSearch);
document.getElementById("reimportBtn").addEventListener("click", handleReimport);
document.getElementById("printBtn").addEventListener("click", ()=>{
  buildPrintSheet();
  window.print();
});

buildBoard();
loadData();

// --- Fixed bottom horizontal scroll bar ---
const boardEl = document.querySelector(".board");
const hSlider = document.getElementById("hscrollSlider");
const hLeftBtn = document.getElementById("hscrollLeftBtn");
const hRightBtn = document.getElementById("hscrollRightBtn");

function updateSliderRange(){
  const max = Math.max(boardEl.scrollWidth - boardEl.clientWidth, 0);
  hSlider.max = max;
  if(parseInt(hSlider.value) > max) hSlider.value = max;
}

function syncSliderFromBoard(){
  hSlider.value = boardEl.scrollLeft;
}

hSlider.addEventListener("input", ()=>{
  boardEl.scrollLeft = parseInt(hSlider.value);
});

boardEl.addEventListener("scroll", syncSliderFromBoard);
window.addEventListener("resize", updateSliderRange);

function scrollBoardBy(amount){
  boardEl.scrollBy({ left: amount, behavior: "smooth" });
}

let holdTimer = null;
function startHold(amount){
  scrollBoardBy(amount);
  holdTimer = setInterval(()=> boardEl.scrollLeft += amount/6, 60);
}
function stopHold(){
  clearInterval(holdTimer);
  holdTimer = null;
}

hLeftBtn.addEventListener("click", ()=> scrollBoardBy(-280));
hRightBtn.addEventListener("click", ()=> scrollBoardBy(280));
hLeftBtn.addEventListener("mousedown", ()=> startHold(-280));
hRightBtn.addEventListener("mousedown", ()=> startHold(280));
["mouseup","mouseleave"].forEach(ev=>{
  hLeftBtn.addEventListener(ev, stopHold);
  hRightBtn.addEventListener(ev, stopHold);
});

setTimeout(updateSliderRange, 200);

</script>
</body>
</html>
